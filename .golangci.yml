version: "2"

run:
  timeout: 3m

linters:
  default: standard
  enable:
    - revive
    - gocritic
    - errorlint
    - wrapcheck
    - bodyclose
    - contextcheck
    - noctx
    - nilnil
    - sqlclosecheck
    - durationcheck
    - unconvert
    - misspell
    - prealloc
    - paralleltest
    - thelper
    - tparallel
    - testifylint
    - gocyclo
    - funlen
  settings:
    gocyclo:
      min-complexity: 10
    funlen:
      lines: 120
      statements: 60
    revive:
      rules:
        - name: var-naming
        - name: package-comments
          disabled: true

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0